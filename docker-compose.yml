# ─────────────────────────────────────────────────────────────────────────────
#  Plateforme Big Data — Food Nutrition Lakehouse
#  Services : MinIO · PostgreSQL · Hive Metastore · Spark Master · Spark Worker
#
#  Démarrage : docker compose up -d
#  Arrêt     : docker compose down
#  Reset data: docker compose down -v
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ───────────────────────────────────────────────────────
  #  MinIO — Data Lake (compatible S3)
  # ───────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: minio
    hostname: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - bigdata-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - bigdata-net
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin123;
        mc mb local/raw       --ignore-existing;
        mc mb local/silver    --ignore-existing;
        mc mb local/warehouse --ignore-existing;
        echo '>>> Buckets MinIO créés : raw, silver, warehouse';
      "
    restart: on-failure

  # ───────────────────────────────────────────────────────
  #  PostgreSQL
  # ───────────────────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: postgres
    hostname: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: foodnutrition
      POSTGRES_PASSWORD: foodnutrition123
      POSTGRES_DB: food_nutrition
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bigdata-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foodnutrition -d food_nutrition"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ───────────────────────────────────────────────────────
  #  Spark Master (image officielle Apache)
  #  UI : http://localhost:8080
  # ───────────────────────────────────────────────────────
  spark-master:
    image: apache/spark:3.5.3
    container_name: spark-master
    hostname: spark-master
    user: root
    ports:
      - "7077:7077"
      - "8080:8080"
    environment:
      - SPARK_NO_DAEMONIZE=true
      - SPARK_LOCAL_HOSTNAME=spark-master
      - SPARK_MASTER_HOST=spark-master
    command: >
      /bin/bash -c "
      mkdir -p /opt/spark/jars-extra &&
      cd /opt/spark/jars-extra &&
      [ ! -f hadoop-aws-3.3.4.jar ] && wget -q https://repo1.maven.org/maven2/org/apache/hadoop/hadoop-aws/3.3.4/hadoop-aws-3.3.4.jar || true ;
      [ ! -f aws-java-sdk-bundle-1.12.262.jar ] && wget -q https://repo1.maven.org/maven2/com/amazonaws/aws-java-sdk-bundle/1.12.262/aws-java-sdk-bundle-1.12.262.jar || true ;
      cp /opt/spark/jars-extra/*.jar /opt/spark/jars/ ;
      /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master --host spark-master
      "
    volumes:
      - ./scripts:/opt/spark/scripts
      - ./config:/opt/spark/config
      - ./data:/opt/spark/data
      - ./logs:/opt/spark/logs
      - spark_jars:/opt/spark/jars-extra
    networks:
      - bigdata-net

  # ───────────────────────────────────────────────────────
  #  Spark Worker (image officielle Apache)
  #  UI : http://localhost:8082  (8081 occupé sur la machine hôte)
  # ───────────────────────────────────────────────────────
  spark-worker:
    image: apache/spark:3.5.3
    container_name: spark-worker
    hostname: spark-worker
    user: root
    ports:
      - "8082:8081"
    environment:
      - SPARK_NO_DAEMONIZE=true
      - SPARK_LOCAL_HOSTNAME=spark-worker
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
    command: >
      /bin/bash -c "
      mkdir -p /opt/spark/jars-extra &&
      cd /opt/spark/jars-extra &&
      [ ! -f hadoop-aws-3.3.4.jar ] && wget -q https://repo1.maven.org/maven2/org/apache/hadoop/hadoop-aws/3.3.4/hadoop-aws-3.3.4.jar || true ;
      [ ! -f aws-java-sdk-bundle-1.12.262.jar ] && wget -q https://repo1.maven.org/maven2/com/amazonaws/aws-java-sdk-bundle/1.12.262/aws-java-sdk-bundle-1.12.262.jar || true ;
      cp /opt/spark/jars-extra/*.jar /opt/spark/jars/ ;
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
      "
    depends_on:
      - spark-master
    volumes:
      - ./scripts:/opt/spark/scripts
      - ./config:/opt/spark/config
      - ./data:/opt/spark/data
      - ./logs:/opt/spark/logs
      - spark_jars:/opt/spark/jars-extra
    networks:
      - bigdata-net

volumes:
  minio_data:
  postgres_data:
  spark_jars:

networks:
  bigdata-net:
    driver: bridge